version: '3'
services:
  vch:
    image: "mcr.microsoft.com/dotnet/sdk:2.1"
    command: dotnet run -c Release
    working_dir: /app/VchAPI
    ports:
      - "127.0.0.1:19999:19999"
    restart: always
    volumes:
     - ./:/app
  mongo:
    image: "mongo"
    restart: always
    volumes:
     - ./db_data:/data/db
